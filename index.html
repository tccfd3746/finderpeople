<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 義消緊急召集與通報系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.02); }
        }
        .emergency-pulse {
            animation: pulse-red 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🚨</span>
                <h1 class="text-lg font-bold tracking-wide text-red-500">義消緊急派遣系統</h1>
            </div>
            <button onclick="switchTab()" id="modeToggleBtn" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-full border border-slate-600 transition">
                <i class="fa-solid fa-arrows-rotate mr-1"></i> 切換模式
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">

        <!-- 未設定 GAS URL 提示框 -->
        <div id="gasWarning" class="hidden mb-4 p-3 bg-amber-950 border border-amber-600 rounded-lg text-amber-200 text-xs flex justify-between items-center">
            <span><i class="fa-solid fa-triangle-exclamation mr-1 text-amber-400"></i> 請先設定 Google Apps Script URL</span>
            <button onclick="openSettings()" class="underline font-semibold ml-2">設定</button>
        </div>

        <!-- ==================== View 1: 指揮官發布控制台 ==================== -->
        <section id="commanderView" class="space-y-4">
            <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base font-bold text-slate-200 flex items-center">
                        <i class="fa-solid fa-tower-broadcast text-red-500 mr-2"></i> 發布派遣任務
                    </h2>
                    <button onclick="openSettings()" class="text-slate-400 hover:text-slate-200 text-xs">
                        <i class="fa-solid fa-gear"></i> 設定
                    </button>
                </div>

                <form id="dispatchForm" class="space-y-4" onsubmit="handleDispatch(event)">
                    <!-- 指揮官身份驗證 -->
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">指揮官 PIN 碼驗證</label>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="commanderSelect" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-red-500">
                                <option value="1111">分隊長 - 許佳莉</option>
                                <option value="2222">小隊長 - 鄭瑛校</option>
                                <option value="3333">小隊長 - 葉志學</option>
                                <option value="4444">小隊長 - 蕭勝文</option>
                            </select>
                            <input type="password" id="pinInput" placeholder="輸入 PIN 碼" required maxlength="4"
                                class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-red-500 tracking-widest text-center">
                        </div>
                    </div>

                    <!-- 災害類型 -->
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">災害 / 任務類型</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button type="button" onclick="selectType('🚨 火災救援')" class="type-btn border border-red-600 bg-red-950/40 text-red-300 rounded-lg py-2 text-xs font-semibold hover:bg-red-900/60">🚨 火災救援</button>
                            <button type="button" onclick="selectType('🚗 車禍救助')" class="type-btn border border-slate-700 bg-slate-900 text-slate-300 rounded-lg py-2 text-xs font-semibold hover:bg-slate-700">🚗 車禍救助</button>
                            <button type="button" onclick="selectType('🧗 特種搜救')" class="type-btn border border-slate-700 bg-slate-900 text-slate-300 rounded-lg py-2 text-xs font-semibold hover:bg-slate-700">🧗 特種搜救</button>
                            <button type="button" onclick="selectType('📢 演練召集')" class="type-btn border border-slate-700 bg-slate-900 text-slate-300 rounded-lg py-2 text-xs font-semibold hover:bg-slate-700">📢 演練召集</button>
                        </div>
                        <input type="hidden" id="selectedType" value="🚨 火災救援">
                    </div>

                    <!-- 救援地點與 GPS 定位 -->
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">救援 / 集結地點</label>
                        <div class="relative">
                            <input type="text" id="addressInput" placeholder="請輸入完整地址或地標名稱" required
                                class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-3 pr-10 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-red-500">
                            <button type="button" onclick="getCurrentLocation()" class="absolute right-2 top-2 text-slate-400 hover:text-red-400 p-1" title="定位當前位置">
                                <i class="fa-solid fa-location-crosshairs text-base"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 現場指示說明 -->
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">現場說明與裝備指示</label>
                        <textarea id="notesInput" rows="3" placeholder="例如：二樓有煙竄出，請攜帶空氣瓶與破壞器材支援..."
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm text-slate-100 focus:outline-none focus:border-red-500"></textarea>
                    </div>

                    <!-- 發布按鈕 -->
                    <button type="submit" id="dispatchBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-red-900/40 transition flex items-center justify-center space-x-2 text-base">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span>即刻群發 LINE 廣播</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- ==================== View 2: 義消通報到達與回應頁面 ==================== -->
        <section id="volunteerView" class="hidden space-y-4">
            <!-- 警報廣播卡片 -->
            <div class="bg-gradient-to-b from-red-950 via-slate-800 to-slate-800 rounded-xl p-5 border-2 border-red-600 shadow-2xl emergency-pulse">
                <div class="flex items-center justify-between border-b border-red-900/60 pb-3 mb-3">
                    <span id="displayType" class="bg-red-600 text-white text-xs font-black px-2.5 py-1 rounded">🚨 火災救援</span>
                    <span id="displayCommander" class="text-xs text-yellow-300 font-medium">指揮官：載入中...</span>
                </div>

                <!-- 救援地點 -->
                <div class="my-4">
                    <div class="text-xs text-slate-400 mb-1">📍 救援目標地址</div>
                    <div id="displayAddress" class="text-xl font-black text-white tracking-wide leading-snug">
                        請點擊下方語音朗讀確認
                    </div>
                </div>

                <!-- 現場說明 -->
                <div class="bg-slate-900/80 rounded-lg p-3 border border-slate-700 mb-4 text-xs text-slate-300 leading-relaxed">
                    <span class="text-slate-400 font-bold block mb-1">📝 現場說明：</span>
                    <span id="displayNotes">無附加說明</span>
                </div>

                <!-- 雙按鈕：TTS 語音朗讀 + 地圖導航 -->
                <div class="grid grid-cols-2 gap-3 mb-2">
                    <button onclick="speakTargetInfo()" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-lg text-sm flex items-center justify-center space-x-1.5 shadow">
                        <i class="fa-solid fa-volume-high text-lg"></i>
                        <span>🔊 語音朗讀</span>
                    </button>
                    <a id="navBtn" href="#" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-sm flex items-center justify-center space-x-1.5 shadow">
                        <i class="fa-solid fa-diamond-turn-right text-lg"></i>
                        <span>🗺️ 一鍵導航</span>
                    </a>
                </div>
            </div>

            <!-- 即時回覆報到區塊 -->
            <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-xl">
                <h3 class="text-sm font-bold text-slate-200 mb-3 flex items-center">
                    <i class="fa-solid fa-user-check text-green-500 mr-2"></i> 義消即時回覆報到
                </h3>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">姓名 / 隊號</label>
                        <input type="text" id="volunteerName" placeholder="例如：陳大明 (第一分隊)"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-green-500">
                    </div>

                    <div class="grid grid-cols-3 gap-2 pt-1">
                        <button onclick="submitResponse('即刻前往')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg text-xs flex flex-col items-center justify-center space-y-1 shadow">
                            <i class="fa-solid fa-person-running text-base"></i>
                            <span>即刻前往</span>
                        </button>
                        <button onclick="submitResponse('稍後到達')" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-lg text-xs flex flex-col items-center justify-center space-y-1 shadow">
                            <i class="fa-solid fa-clock text-base"></i>
                            <span>稍後到達</span>
                        </button>
                        <button onclick="submitResponse('無法前往')" class="bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold py-3 rounded-lg text-xs flex flex-col items-center justify-center space-y-1 shadow">
                            <i class="fa-solid fa-xmark text-base"></i>
                            <span>無法前往</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal 設定彈窗 -->
    <div id="settingsModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 max-w-sm w-full space-y-4">
            <h3 class="text-base font-bold text-slate-100"><i class="fa-solid fa-sliders mr-2"></i>系統參數設定</h3>
            <div>
                <label class="block text-xs text-slate-400 mb-1">Google Apps Script Web App URL</label>
                <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
            </div>
            <div class="flex justify-end space-x-2 pt-2">
                <button onclick="closeSettings()" class="bg-slate-700 px-4 py-2 rounded-lg text-xs">取消</button>
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-xs font-bold">儲存</button>
            </div>
        </div>
    </div>

    <!-- JS 核心邏輯 -->
    <script>
        let currentMode = 'commander';

        // 頁面初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadGasUrl();
            checkUrlParams();
            loadVolunteerName();
        });

        // 解析 URL 參數 (供 LINE 點開時顯示派遣資訊)
        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const addr = params.get('addr');
            const type = params.get('type');
            const commander = params.get('commander');
            const notes = params.get('notes');

            if (addr) {
                showVolunteerView({
                    address: addr,
                    type: type || '🚨 緊急召集',
                    commander: commander || '隊部指揮官',
                    notes: notes || '請速至現場支援'
                });
            }
        }

        function switchTab() {
            if (currentMode === 'commander') {
                showVolunteerView({
                    address: '台中市烏日區新興路 100 號 (預覽地址)',
                    type: '🚨 火災救援',
                    commander: '分隊長 - 許佳莉',
                    notes: '現場鐵皮工廠火警，請帶空氣瓶報到。'
                });
            } else {
                showCommanderView();
            }
        }

        function showCommanderView() {
            currentMode = 'commander';
            document.getElementById('commanderView').classList.remove('hidden');
            document.getElementById('volunteerView').classList.add('hidden');
            document.getElementById('modeToggleBtn').innerHTML = '<i class="fa-solid fa-eye mr-1"></i> 預覽義消頁面';
        }

        function showVolunteerView(data) {
            currentMode = 'volunteer';
            document.getElementById('commanderView').classList.add('hidden');
            document.getElementById('volunteerView').classList.remove('hidden');
            document.getElementById('modeToggleBtn').innerHTML = '<i class="fa-solid fa-pen-to-square mr-1"></i> 切換指揮官模式';

            if (data) {
                document.getElementById('displayAddress').innerText = data.address;
                document.getElementById('displayType').innerText = data.type;
                document.getElementById('displayCommander').innerText = '發布：' + data.commander;
                document.getElementById('displayNotes').innerText = data.notes;

                // 導航 URL
                const navUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.address)}`;
                document.getElementById('navBtn').href = navUrl;

                // 觸發語音
                setTimeout(() => speakTargetInfo(), 600);
            }
        }

        // 選擇災害類型
        function selectType(type) {
            document.getElementById('selectedType').value = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                if (btn.innerText.includes(type.split(' ')[1] || type)) {
                    btn.className = 'type-btn border border-red-600 bg-red-950/40 text-red-300 rounded-lg py-2 text-xs font-semibold';
                } else {
                    btn.className = 'type-btn border border-slate-700 bg-slate-900 text-slate-300 rounded-lg py-2 text-xs font-semibold hover:bg-slate-700';
                }
            });
        }

        // 語音朗讀 (TTS)
        function speakTargetInfo() {
            const addr = document.getElementById('displayAddress').innerText;
            const notes = document.getElementById('displayNotes').innerText;
            const textToSpeak = `緊急通報。救援地點：${addr}。說明：${notes}`;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.0;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        // 取得當前 GPS 定位地址
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    document.getElementById('addressInput').value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                }, (err) => {
                    alert('無法取得 GPS 定位，請手動輸入地址');
                });
            }
        }

        // 發布任務給 GAS 後端
        async function handleDispatch(e) {
            e.preventDefault();
            const gasUrl = localStorage.getItem('gas_app_url');
            if (!gasUrl) {
                alert('請先點擊右上角設定，輸入 Google Apps Script URL！');
                openSettings();
                return;
            }

            const pin = document.getElementById('pinInput').value;
            const type = document.getElementById('selectedType').value;
            const address = document.getElementById('addressInput').value;
            const notes = document.getElementById('notesInput').value || '請即刻支援';

            const dispatchBtn = document.getElementById('dispatchBtn');
            dispatchBtn.disabled = true;
            dispatchBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> 發送中...';

            // 產生義消點擊的完整 landing URL
            const currentBaseUrl = window.location.href.split('?')[0];
            const landingUrl = `${currentBaseUrl}?addr=${encodeURIComponent(address)}&type=${encodeURIComponent(type)}&notes=${encodeURIComponent(notes)}`;

            try {
                const response = await fetch(gasUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'dispatch',
                        pin: pin,
                        type: type,
                        address: address,
                        notes: notes,
                        landingUrl: landingUrl
                    })
                });

                const res = await response.json();
                if (res.result === 'success') {
                    alert(`✅ 發布成功！\n發布指揮官：${res.commander}\n訊息已直接群發推播至 LINE！`);
                    document.getElementById('dispatchForm').reset();
                } else {
                    alert('❌ 發布失敗：' + (res.message || 'PIN 碼不正確'));
                }
            } catch (err) {
                alert('發布時發生連線錯誤：' + err.toString());
            } finally {
                dispatchBtn.disabled = false;
                dispatchBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> <span>即刻群發 LINE 廣播</span>';
            }
        }

        // 義消回應報到
        async function submitResponse(status) {
            const nameInput = document.getElementById('volunteerName');
            const name = nameInput.value.trim();
            if (!name) {
                alert('請先輸入您的姓名或隊號！');
                nameInput.focus();
                return;
            }

            localStorage.setItem('volunteer_name', name);
            const gasUrl = localStorage.getItem('gas_app_url');
            const address = document.getElementById('displayAddress').innerText;

            if (!gasUrl) {
                alert('報到已記錄於本機（尚未設定 GAS 後端同步）。');
                return;
            }

            try {
                await fetch(gasUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'respond',
                        name: name,
                        status: status,
                        address: address
                    })
                });
                alert(`✅ 已成功回覆：【${status}】\n感謝支援！`);
            } catch (err) {
                alert('回應傳送失敗，請確認網路連線。');
            }
        }

        // 設定檔管理
        function openSettings() {
            document.getElementById('gasUrlInput').value = localStorage.getItem('gas_app_url') || '';
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveSettings() {
            const url = document.getElementById('gasUrlInput').value.trim();
            if (url) {
                localStorage.setItem('gas_app_url', url);
                document.getElementById('gasWarning').classList.add('hidden');
                alert('設定已儲存！');
            }
            closeSettings();
        }

        function loadGasUrl() {
            const url = localStorage.getItem('gas_app_url');
            if (!url) {
                document.getElementById('gasWarning').classList.remove('hidden');
            }
        }

        function loadVolunteerName() {
            const savedName = localStorage.getItem('volunteer_name');
            if (savedName) {
                document.getElementById('volunteerName').value = savedName;
            }
        }
    </script>
</body>
</html>
